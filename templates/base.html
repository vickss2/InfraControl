<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraControl</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff85a1; --sidebar-bg: #ffffff; }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: var(--sidebar-bg); position: fixed; padding: 30px 20px; border-right: 1px solid #eee; }
        .sidebar-brand { color: var(--primary); font-weight: 800; font-size: 1.5rem; text-decoration: none; display: block; text-align: center; margin-bottom: 40px; }
        .nav-link { color: #666; font-weight: 600; padding: 12px; border-radius: 12px; margin-bottom: 5px; transition: 0.3s; text-decoration: none; display: block; }
        .nav-link:hover { background: #fff5f7; color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white; }
        .main-wrapper { margin-left: 260px; width: 100%; padding: 40px; }
        .alert { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="{{ url_for('dashboard') }}" class="sidebar-brand">InfraControl</a>
        <div class="nav flex-column">
            <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">📊 Dashboard</a>
            <a href="{{ url_for('clientes') }}" class="nav-link {% if request.endpoint in ['clientes', 'editar_cliente'] %}active{% endif %}">👥 Clientes</a>
            <a href="{{ url_for('ordens') }}" class="nav-link {% if request.endpoint == 'ordens' %}active{% endif %}">🛠️ Ordens Ativas</a>
            <a href="{{ url_for('historico') }}" class="nav-link {% if request.endpoint == 'historico' %}active{% endif %}">📚 Histórico</a>
        </div>
        <div class="mt-auto"><hr><a href="{{ url_for('logout') }}" class="nav-link text-danger">🚪 Sair</a></div>
    </nav>

    <div class="main-wrapper">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
